<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Savings - Access Bank</title>
    <link rel="stylesheet" href="access.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-wrapper">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="nav-left">
                <button class="back-btn" aria-label="Go back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="nav-title">Savings</div>
            </div>
            <div class="nav-right">
                <button class="menu-btn" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                </button>
            </div>
        </nav>

        <!-- Main Content Scrollable Area -->
        <main class="content-area">
            
            <header class="section-header">
                <h1>Fixed Savings</h1>
                <p>Secure your future with high-yield returns.</p>
            </header>

            <!-- Card -->
            <div class="balance-card-container">
                <div class="balance-card">
                    <!-- Decor elements -->
                    <div class="card-decor-1"></div>
                    <div class="card-decor-2"></div>
                    
                    <div class="card-content">
                        <div class="card-top">
                            <span class="card-label">Available Balance</span>
                            <div class="bank-logo">access</div>
                        </div>
                        
                        <div class="balance-amount">
                            <span class="currency">$</span>225<span class="decimals">.00</span>
                        </div>
                        
                        <div class="card-bottom">
                            <div class="detail-block">
                                <span class="detail-label">Maturity Date</span>
                                <span class="detail-value">1st January, 2027</span>
                            </div>
                            <div class="status-pill">
                                <span class="dot"></span> Active
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-grid">
                <button class="action-card primary">
                    <div class="icon-wrapper">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <span>Top Up</span>
                </button>
                <button class="action-card secondary">
                    <div class="icon-wrapper">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span>Statement</span>
                </button>
            </div>

            <!-- Summary Details -->
            <div class="details-section">
                <h3>Plan Details</h3>
                <div class="details-list">
                    <div class="detail-row">
                        <div class="row-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <div class="row-info">
                            <span class="row-title">Interest Rate</span>
                            <span class="row-sub">Per annum</span>
                        </div>
                        <div class="row-value">8.5%</div>
                    </div>
                    <div class="detail-row">
                        <div class="row-icon purple">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <div class="row-info">
                            <span class="row-title">Creation Date</span>
                            <span class="row-sub">Duration Tracking</span>
                        </div>
                        <div class="row-value">Mar 18, 2026</div>
                    </div>
                </div>
            </div>
            
        </main>
    </div>
</body>
</html>
